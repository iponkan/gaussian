<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D大模型瞬时生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        /* Glowing neon vibes */
        .neon-border { border: 2px solid rgba(0,255,128,0.5); box-shadow: 0 0 15px rgba(0,255,128,0.3); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">
    
    <!-- 左侧控制面板 -->
    <div class="w-1/3 bg-gray-900 border-r border-gray-800 p-6 flex flex-col h-full shadow-2xl relative z-10" style="min-width: 400px;">
        <h1 class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">TripoSR 引擎的瞬时3D生成！</h1>
        <p class="text-gray-400 text-sm mb-8">无需漫长算力，基于最新前馈大模型结构。单图3秒钟，见证魔法时刻。</p>
        
        <!-- 上传区域 -->
        <div id="uploadArea" class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer hover:border-emerald-500 hover:bg-gray-800 transition neon-border">
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            <svg class="w-16 h-16 mx-auto text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="text-lg font-medium text-emerald-300">点击此处或拖拽卡车照片</p>
            <p class="text-sm text-gray-500 mt-2">推荐选择 1~4 张最清晰的照片。只要1张也足以变成立体模型！</p>
        </div>

        <!-- 进度区域 -->
        <div id="progressArea" class="hidden mt-8 flex-col flex-1">
            <h2 class="text-xl font-bold mb-4">🚀 生成状态</h2>
            
            <div id="progressText" class="text-sm text-emerald-400 mb-2 font-mono">正在分析特征...</div>
            <div class="w-full bg-gray-800 rounded-full h-4 mb-6 relative overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-emerald-500 to-cyan-500 h-4 rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(16,185,129,0.8)]" style="width: 0%"></div>
            </div>

            <!-- Log box for realism -->
            <div class="bg-black/50 border border-gray-800 p-3 rounded text-xs font-mono text-gray-400 flex-1 overflow-y-auto" id="logBox">
                等待任务启动...
            </div>
            
            <button id="resetBtn" class="mt-4 w-full py-3 rounded-lg bg-gray-700 hover:bg-red-600 text-white font-bold transition">
                强制打断并重新提交 (F5)
            </button>
        </div>
    </div>

    <!-- 右侧画室: WebGL (Model Viewer) -->
    <div id="canvasContainer" class="flex-1 bg-black relative flex items-center justify-center">
        <!-- Default State -->
        <div id="viewerPlaceholder" class="absolute flex flex-col items-center pointer-events-none opacity-50">
            <svg class="w-32 h-32 text-gray-700 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
            <p class="mt-4 text-xl tracking-widest text-gray-500 uppercase">等待 AI 注入灵魂...</p>
        </div>
        
        <model-viewer id="modelViewer" class="hidden w-full h-full"
            camera-controls 
            auto-rotate
            auto-rotate-delay="0"
            rotation-per-second="30deg"
            shadow-intensity="1"
            exposure="1.2"
            environment-image="neutral">
        </model-viewer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressArea = document.getElementById('progressArea');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const logBox = document.getElementById('logBox');
        const canvasContainer = document.getElementById('canvasContainer');
        const resetBtn = document.getElementById('resetBtn');
        const viewerPlaceholder = document.getElementById('viewerPlaceholder');
        const modelViewer = document.getElementById('modelViewer');

        let isUploading = false;

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-emerald-400');
            uploadArea.classList.add('bg-gray-800');
        });
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-emerald-400');
            uploadArea.classList.remove('bg-gray-800');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-emerald-400');
            uploadArea.classList.remove('bg-gray-800');
            handleFiles(e.dataTransfer.files);
        });

        resetBtn.addEventListener('click', () => location.reload());

        function log(msg) {
            logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function handleFiles(files) {
            if (isUploading || files.length === 0) return;
            isUploading = true;
            
            log(`选定了 ${files.length} 张卡车照片，TripoSR 将提取最有特征的进行处理...`);
            uploadArea.classList.add('hidden');
            progressArea.classList.remove('hidden');
            progressText.innerText = "📦 正在向 GPU 推送图片数据...";
            
            const formData = new FormData();
            for(let i=0; i<files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                if (!res.ok) throw new Error("上传失败");
                const data = await res.json();
                
                log(`🚀 任务交接完成，ID: ${data.task_id}`);
                pollStatus(data.task_id);
            } catch(e) {
                progressText.innerText = "❌ 提交失败";
                progressText.classList.replace("text-emerald-400", "text-red-500");
                log(e.toString());
            }
        }

        async function pollStatus(taskId) {
            try {
                const res = await fetch(`/api/status/${taskId}`);
                if (!res.ok) throw new Error("状态轮询失败");
                const task = await res.json();
                
                progressBar.style.width = `${task.progress}%`;
                progressText.innerText = `${task.progress}% - ${task.message}`;
                log(`[Status: ${task.status}] ${task.message}`);

                if (task.status === "completed") {
                    progressText.innerText = "✨ 生成完毕！即将渲染...";
                    log("正在加载 .glb 网格文件进入场景...");
                    loadModelIntoViewer(task.result_url);
                } else if (task.status === "failed") {
                    progressBar.classList.replace("from-emerald-500", "from-red-500");
                    progressText.classList.replace("text-emerald-400", "text-red-500");
                    progressText.innerText = `❌ ${task.message}`;
                } else {
                    setTimeout(() => pollStatus(taskId), 1000); // 1秒轮询
                }
            } catch(e) {
                log("网络连接中断，请等待或按 F5 刷新...");
                setTimeout(() => pollStatus(taskId), 2000);
            }
        }

        function loadModelIntoViewer(url) {
            viewerPlaceholder.classList.add("hidden");
            modelViewer.classList.remove("hidden");
            // The result_url natively exports as .obj in the python code. But we converted to .glb
            // Need to make sure backend returns .glb URL!
            modelViewer.src = url.replace('.obj', '.glb');
            log("模型渲染成功！欢迎从各个角度把玩您的卡车 🥳");
        }
    </script>
</body>
</html>
